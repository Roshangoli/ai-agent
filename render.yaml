services:
  # Backend API (FastAPI)
  - type: web
    name: ai-analytics-backend
    runtime: python
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend/api && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health

  # Frontend (Static Site served via Node)
  - type: web
    name: ai-analytics-frontend
    runtime: node
    env: node
    region: oregon
    plan: free
    branch: main
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npx serve -s dist -l $PORT"
    envVars:
      - key: VITE_API_URL
        value: https://ai-analytics-backend.onrender.com
      - key: NODE_VERSION
        value: "18"